[tools]
# Language runtimes
go     = "1.25.9"
node   = "22.22.0"
python = "3.12.13"
ruby   = "3.3.5"

# Go - prebuilt binaries via aqua
"aqua:golangci/golangci-lint" = "2.3.1"
"aqua:securego/gosec"         = "2.22.7"

# General CLI tools (prebuilt binaries via aqua)
"aqua:BurntSushi/ripgrep"             = "latest"
"aqua:antonmedv/fx"                   = "latest"
"aqua:bazelbuild/bazel-watcher"       = "latest"
"aqua:bazelbuild/bazelisk"            = "latest"
"aqua:bazelbuild/buildtools/buildifier" = "latest"
"aqua:bazelbuild/buildtools/buildozer"  = "latest"
"aqua:cli/cli"                        = "latest"
"aqua:hadolint/hadolint"              = "latest"
"aqua:hashicorp/terraform-ls"         = "latest"
"aqua:helm/helm"                      = "latest"
"aqua:jqlang/jq"                      = "latest"
"aqua:junegunn/fzf"                   = "latest"
"aqua:koalaman/shellcheck"            = "latest"
"aqua:kubernetes-sigs/kind"           = "latest"
"aqua:kubernetes/kubernetes/kubectl"  = "latest"
"aqua:mikefarah/yq"                   = "latest"
"aqua:sharkdp/fd"                     = "latest"
"aqua:terraform-linters/tflint"       = "latest"
"aqua:tilt-dev/ctlptl"                = "latest"
"aqua:tilt-dev/tilt"                  = "latest"
"aqua:wagoodman/dive"                 = "latest"

# Lua
"aqua:LuaLS/lua-language-server" = "latest"

# Go - no prebuilt binaries, install via go toolchain
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"
"go:golang.org/x/tools/gopls"          = "latest"
"go:golang.org/x/tools/cmd/goimports"  = "latest"

# Python
ruff                     = "latest"
uv                       = "latest"
"pipx:jc"                = "latest"
"pipx:python-lsp-server" = "1.9"

# Node
"npm:eslint" = "latest"

# Ruby
"gem:github_changelog_generator" = "1.16.4"
"gem:rubocop"                    = "latest"

[settings]
trusted_config_paths = ["/Users/abhishekrai/workspace/dotfiles/.config/mise", "/Users/abhishek/workspace/darthfork/dotfiles/.config/mise"]
idiomatic_version_file_enable_tools = ["go", "python"]
